<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 선택자 기본 / 기본 박스 02</title>
    <style>
        /*모든 선택자-> body*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: 1px solid red;
        }

        /*tag 선택자 / 후손 선택자*/
        section li {
            color: #ff0000;
        }

        section li:nth-child(1) {
            color: #369;
        }

        section div:nth-child(2) {
            color: #ff0;
        }

        section div:nth-of-type(2) {
            color: #0ff;
        }

        #color {
            color: #0f0;
        }

        .color {
            color: #359;
        }

        /*형제 선택자 : */
        .color~li {
            color: #f0f;
        }

        /*인접형제 선택자 : 위에 선택자는 안됨, 밑에 선택자만 가능*/
        .color+li {
            color: chocolate;
        }

        input {
            outline: none;
        }

        input [type="text"] {
            border: 1px solid #f00;
        }

        [class="color"] {
            background-color: #ff0;
        }

        /*col로 시작하는 선택자*/
        [class="col"] {
            background-color: #ff0;
        }

        /*section 밖에 있는 ul div도 선택*/
        section ul,
        section div {
            background: #ddd;
        }
    </style>
</head>

<body>
    <section>
        <ul>
            <li>BOX01</li>
            <!-- id는 보통 안에 안씀 밖에 씀 / !important>id>class>태그 : 우선 순위-->
            <li id="color" class="color">BOX02</li>
            <li class="col">BOX03</li>
            <li>BOX04</li>
            <li>BOX05</li>
            <li>BOX06</li>
            <li>BOX07</li>

        </ul>
        <div>
            BOX08
        </div>
        <div>
            BOX09
        </div>
        <input type="text">
        <input type="search">
    </section>
    <div>BOX10</div>

</body>

</html>
